<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>加入組織 · Credica</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/tokens.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;
      background:var(--bg,#F4F5F7);color:var(--text,#0F1220);
      min-height:100vh;min-height:100dvh;
      display:flex;align-items:center;justify-content:center;
      padding:24px;-webkit-font-smoothing:antialiased;
    }
    .card{
      width:100%;max-width:420px;background:var(--surface,#fff);
      border-radius:24px;padding:32px 26px 28px;
      box-shadow:0 18px 48px rgba(15,18,32,0.10),0 0 0 1px rgba(15,18,32,0.05);
      text-align:center;
    }
    .logo{width:56px;height:56px;border-radius:16px;margin:0 auto 18px;display:block;}
    .eyebrow{font-size:13px;font-weight:700;color:var(--text-sub,#6B7280);letter-spacing:.3px;}
    .org{font-size:26px;font-weight:800;letter-spacing:-0.4px;margin:8px 0 6px;line-height:1.25;}
    .scene{display:inline-block;font-size:12.5px;font-weight:700;color:var(--navy,#1E2951);
      background:var(--pastel-lavender,#E6E9FA);padding:5px 13px;border-radius:999px;}
    .sub{font-size:14px;color:var(--text-sub,#6B7280);line-height:1.6;margin:18px 0 22px;}
    .code-pill{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:22px;font-weight:800;
      letter-spacing:6px;color:var(--navy,#1E2951);background:var(--navy-tint,rgba(30,41,81,0.06));
      padding:12px 18px 12px 24px;border-radius:14px;display:inline-block;margin-bottom:22px;}
    .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
      padding:16px;border-radius:14px;font-size:16px;font-weight:800;border:0;cursor:pointer;
      text-decoration:none;transition:transform .06s,opacity .2s;}
    .btn:active{transform:scale(0.98);}
    .btn-primary{background:var(--navy,#1E2951);color:#fff;}
    .btn-store{background:var(--surface,#fff);color:var(--text,#0F1220);
      border:1.5px solid var(--border,rgba(15,18,32,0.12));margin-top:11px;}
    .store-row{display:flex;gap:10px;margin-top:11px;}
    .store-row .btn-store{margin-top:0;flex:1;font-size:14.5px;padding:14px;}
    .foot{font-size:12px;color:var(--text-muted,#9CA3AF);line-height:1.6;margin-top:20px;}
    .state{padding:14px 0;}
    .spinner{width:30px;height:30px;border:3px solid var(--navy-tint,rgba(30,41,81,0.12));
      border-top-color:var(--navy,#1E2951);border-radius:50%;margin:24px auto;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .err-icon{font-size:42px;margin-bottom:10px;}
    .hidden{display:none;}
    a.link{color:var(--navy,#1E2951);font-weight:700;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <img src="/credica-mark.svg" alt="Credica" class="logo">

    <!-- loading -->
    <div id="state-loading" class="state">
      <div class="eyebrow">邀請加入</div>
      <div class="spinner"></div>
      <div class="sub" style="margin:0;">正在確認邀請…</div>
    </div>

    <!-- found -->
    <div id="state-found" class="state hidden">
      <div class="eyebrow">邀請你加入</div>
      <div class="org" id="org-name">組織</div>
      <div id="scene-wrap"><span class="scene" id="scene-label"></span></div>
      <div class="sub">用 Credica App 打開這個邀請，輸入或自動帶入加入碼，就能成為成員。</div>
      <div class="code-pill" id="code-pill">XXXXXX</div>
      <a id="open-app" class="btn btn-primary" href="#">📱 用 Credica App 開啟</a>
      <div class="store-row">
        <a class="btn btn-store" id="ios-store" href="https://apps.apple.com/tw/app/credica-%E5%8F%AF%E9%A9%97%E8%AD%89%E7%9A%84%E6%95%B8%E4%BD%8D%E5%90%8D%E7%89%87/id6760047580">App Store</a>
        <a class="btn btn-store" id="play-store" href="https://play.google.com/store/apps/details?id=com.credica.app">Google Play</a>
      </div>
      <div class="foot">還沒有 App？先下載 Credica，再回到這個畫面按「用 Credica App 開啟」。</div>
    </div>

    <!-- not found / expired -->
    <div id="state-error" class="state hidden">
      <div class="err-icon">🔍</div>
      <div class="org" id="err-title">找不到這個邀請</div>
      <div class="sub" id="err-msg">這個加入碼可能不存在、已失效，或已被管理員更新。請向邀請你的人索取最新的加入碼或連結。</div>
      <a class="btn btn-primary" href="https://credica.app">回到 Credica 首頁</a>
    </div>
  </div>

  <script>
    (function () {
      // 從路徑取加入碼：/join-code/XXXXXX
      var parts = location.pathname.split('/').filter(Boolean);
      var code = (parts[parts.length - 1] || '').toUpperCase();
      // 連結若帶 ?code= 也支援
      var qp = new URLSearchParams(location.search).get('code');
      if (qp) code = qp.toUpperCase();

      var API = 'https://api.credica.app';
      var elLoading = document.getElementById('state-loading');
      var elFound = document.getElementById('state-found');
      var elError = document.getElementById('state-error');

      function show(el) {
        [elLoading, elFound, elError].forEach(function (e) { e.classList.add('hidden'); });
        el.classList.remove('hidden');
      }
      function showError(title, msg) {
        if (title) document.getElementById('err-title').textContent = title;
        if (msg) document.getElementById('err-msg').textContent = msg;
        show(elError);
      }

      var SCENE = {
        club: '社團', community: '社區', construction: '營建工地',
        event: '活動', training: '訓練機構', medical: '醫療機構',
        hr: '企業', supply: '供應鏈', generic: '組織'
      };

      if (!code || code.length < 4) {
        showError('連結不完整', '這個邀請連結缺少加入碼，請向邀請你的人索取完整連結。');
        return;
      }

      // 深連結（給已安裝 App 的人手動按）
      document.getElementById('open-app').setAttribute('href', 'credica://join-code/' + code);
      document.getElementById('code-pill').textContent = code;

      fetch(API + '/api/v1/identity-map/join-code-info?code=' + encodeURIComponent(code))
        .then(function (r) {
          if (r.status === 404) throw { kind: 'notfound' };
          if (r.status === 410) throw { kind: 'expired' };
          if (!r.ok) throw { kind: 'other' };
          return r.json();
        })
        .then(function (res) {
          var d = res && res.data ? res.data : {};
          document.getElementById('org-name').textContent = d.org_name || '組織';
          var label = SCENE[d.scene_type] || '';
          if (label) {
            document.getElementById('scene-label').textContent = label;
          } else {
            document.getElementById('scene-wrap').classList.add('hidden');
          }
          show(elFound);
        })
        .catch(function (e) {
          if (e && e.kind === 'expired') {
            showError('這個邀請已失效', '加入碼已過期或已被管理員更新。請向邀請你的人索取最新的加入碼或連結。');
          } else {
            showError(null, null);
          }
        });
    })();
  </script>
</body>
</html>
