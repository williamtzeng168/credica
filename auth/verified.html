<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credica — 驗證成功</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      text-align: center;
    }
    .header {
      background-color: #1E3A5F;
      padding: 32px 24px;
    }
    .header h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header p {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .body {
      padding: 36px 32px;
    }
    .check-icon {
      width: 64px;
      height: 64px;
      background-color: #0D9488;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .check-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .body h2 {
      font-size: 22px;
      font-weight: 600;
      color: #1E3A5F;
      margin-bottom: 8px;
    }
    .body p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .open-app-btn {
      display: inline-block;
      background-color: #1E3A5F;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: 8px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .open-app-btn:hover { opacity: 0.9; }
    .hint {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 16px;
    }
    .footer {
      padding: 16px 32px 24px;
      border-top: 1px solid #f1f5f9;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Credica</h1>
      <p>Digital Identity & Trust Network</p>
    </div>
    <div class="body">
      <div class="check-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Email 驗證成功！</h2>
      <p>您的帳號已完成驗證，現在可以登入 Credica 開始使用。</p>
      <a class="open-app-btn" href="io.supabase.credica://login-callback/">開啟 Credica App</a>
      <p class="hint">如果按鈕無法開啟 App，請手動返回 Credica 登入。</p>
    </div>
    <div class="footer">
      Credica — 可信賴的數位身份與人脈管理
    </div>
  </div>
</body>
</html>
