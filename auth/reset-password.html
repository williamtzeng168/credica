<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credica — 重設密碼</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background-color: #1E3A5F;
      padding: 32px 24px;
      text-align: center;
    }
    .header h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header p {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .body {
      padding: 32px;
    }
    .body h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1E3A5F;
      margin-bottom: 6px;
      text-align: center;
    }
    .body > p.lead {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: center;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      font-size: 16px;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #1E3A5F; }
    .field .hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #1E3A5F;
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert.error {
      background-color: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .alert.success {
      background-color: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }
    .check-icon {
      width: 64px;
      height: 64px;
      background-color: #0D9488;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .check-icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .deep-link {
      display: inline-block;
      margin-top: 12px;
      background-color: #1E3A5F;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 8px;
    }
    .footer {
      padding: 16px 32px 24px;
      border-top: 1px solid #f1f5f9;
      font-size: 12px;
      color: #cbd5e1;
      text-align: center;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Credica</h1>
      <p>Digital Identity &amp; Trust Network</p>
    </div>

    <div class="body">
      <!-- Loading state — shown while Supabase parses recovery token from URL hash -->
      <div id="state-loading">
        <h2>正在驗證連結…</h2>
        <p class="lead">請稍候，正在處理您的密碼重設請求。</p>
      </div>

      <!-- Reset form — shown after Supabase confirms recovery session is valid -->
      <div id="state-form" class="hidden">
        <h2>設定新密碼</h2>
        <p class="lead">請輸入您的新密碼。密碼至少需 6 個字元。</p>

        <div id="form-error" class="alert error hidden"></div>

        <form id="reset-form" autocomplete="off">
          <div class="field">
            <label for="password">新密碼</label>
            <input id="password" type="password" minlength="6" required autocomplete="new-password">
            <p class="hint">至少 6 個字元</p>
          </div>
          <div class="field">
            <label for="confirm">再次輸入新密碼</label>
            <input id="confirm" type="password" minlength="6" required autocomplete="new-password">
          </div>
          <button class="btn" type="submit" id="submit-btn">更新密碼</button>
        </form>
      </div>

      <!-- Success state -->
      <div id="state-success" class="hidden" style="text-align:center;">
        <div class="check-icon">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>密碼已更新！</h2>
        <p class="lead">您可以使用新密碼登入 Credica。</p>
        <a class="deep-link" href="io.supabase.credica://login-callback/">開啟 Credica App</a>
      </div>

      <!-- Error / invalid link state -->
      <div id="state-invalid" class="hidden" style="text-align:center;">
        <h2 style="color:#b91c1c;">連結無效或已過期</h2>
        <p class="lead">密碼重設連結只能使用一次，且有效期限通常為 1 小時。請回到 Credica App 重新申請。</p>
        <a class="deep-link" href="io.supabase.credica://login-callback/">返回 Credica App</a>
      </div>
    </div>

    <div class="footer">
      Credica — 可信賴的數位身份與人脈管理
    </div>
  </div>

  <script type="module">
    // Supabase JS SDK v2 — UMD ESM build via esm.sh CDN. 與既有 verified.html
    // 同一個 Supabase project；anon key 不機密。
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    const SUPABASE_URL = 'https://jqpfvbjguezgiqkioxxk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcGZ2YmpndWV6Z2lxa2lveHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDMxNDAsImV4cCI6MjA4NzI3OTE0MH0.W4Xi6Cnh4SI5IIBaK90cM2xoIDT0sjoy31ljsdKdmf4';

    // flowType: 'pkce' 要顯式設 — Supabase 寄出的 email link 是 PKCE flow
    // (token=pkce_... 前綴)，redirect 回來會帶 ?code=xxx 在 query string。
    // 預設 flow 在 static HTML 沒 storage 時可能變 implicit，導致 exchange 失敗。
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: false,
        persistSession: false,
        flowType: 'pkce',
        detectSessionInUrl: false, // 我們自己處理 URL parse
      }
    });

    const states = {
      loading: document.getElementById('state-loading'),
      form: document.getElementById('state-form'),
      success: document.getElementById('state-success'),
      invalid: document.getElementById('state-invalid'),
    };
    function showState(name) {
      Object.entries(states).forEach(([k, el]) => {
        if (k === name) el.classList.remove('hidden');
        else el.classList.add('hidden');
      });
    }

    // 把 token 從網址列移除，避免它殘留在瀏覽器歷史/被分享外洩。
    function stripUrl() {
      try { history.replaceState(null, '', window.location.pathname); } catch (_) {}
    }

    // Supabase recovery 連結有 3 種可能形狀，依可靠度排序處理：
    //
    //   1) token_hash flow（首選，本頁正解）：
    //        ?token_hash=xxx&type=recovery
    //        → supabase.auth.verifyOtp({ token_hash, type: 'recovery' })
    //      token_hash 由 Supabase 伺服器驗證，與 PKCE code_verifier 無關。
    //      ⚠️ 關鍵：App（supabase_flutter）用 PKCE 發起密碼重設，code_verifier
    //      只存在「App 內」。reset 連結卻是在「瀏覽器」開啟 — 瀏覽器沒有那把
    //      verifier，所以 exchangeCodeForSession 在這個 App→瀏覽器 情境下「必定」
    //      失敗（這就是先前一點開就「連結無效或已過期」的根因）。token_hash +
    //      verifyOtp 不需要 verifier，任何 client 都能完成，是跨端正解。
    //      另一好處：信件掃描器只做 GET 不會跑 JS，不會提前消耗掉 token。
    //
    //   2) PKCE ?code=（後備）：只有「同一個瀏覽器」發起時才有 verifier 可成功；
    //      App 發起的情境會失敗 → 落到 invalid。保留以相容未來純 web 流程。
    //
    //   3) Implicit #access_token（後備/legacy）：直接 setSession。
    async function init() {
      const url = new URL(window.location.href);
      const query = url.searchParams;
      const hash = window.location.hash.startsWith('#')
        ? window.location.hash.slice(1) : '';
      const hashParams = new URLSearchParams(hash);

      const errorDesc =
        query.get('error_description') || query.get('error') ||
        hashParams.get('error_description') || hashParams.get('error');
      if (errorDesc) {
        console.warn('recovery link error:', errorDesc);
        showState('invalid');
        return;
      }

      // 1) token_hash + verifyOtp（首選）
      const tokenHash = query.get('token_hash') || hashParams.get('token_hash');
      const otpType = query.get('type') || hashParams.get('type') || 'recovery';
      if (tokenHash) {
        try {
          const { error } = await supabase.auth.verifyOtp({
            token_hash: tokenHash,
            type: otpType,
          });
          if (error) throw error;
          stripUrl();
          showState('form');
        } catch (e) {
          console.error('verifyOtp failed', e);
          showState('invalid');
        }
        return;
      }

      // 2) PKCE ?code=（後備）
      const code = query.get('code');
      if (code) {
        try {
          const { error } = await supabase.auth.exchangeCodeForSession(code);
          if (error) throw error;
          stripUrl();
          showState('form');
        } catch (e) {
          console.error('exchangeCodeForSession failed', e);
          showState('invalid');
        }
        return;
      }

      // 3) Implicit / legacy #access_token（後備）
      const type = hashParams.get('type') || query.get('type');
      const accessToken = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');
      if (type === 'recovery' && accessToken && refreshToken) {
        try {
          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });
          if (error) throw error;
          stripUrl();
          showState('form');
        } catch (e) {
          console.error('setSession failed', e);
          showState('invalid');
        }
        return;
      }

      // 沒有任何可用參數 — invalid / 已過期 / 直接造訪。
      console.warn('No recovery params in URL', { query: query.toString(), hash });
      showState('invalid');
    }

    document.getElementById('reset-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errEl = document.getElementById('form-error');
      const btn = document.getElementById('submit-btn');

      errEl.classList.add('hidden');

      if (pw.length < 6) {
        errEl.textContent = '密碼至少 6 個字元。';
        errEl.classList.remove('hidden');
        return;
      }
      if (pw !== confirm) {
        errEl.textContent = '兩次輸入的密碼不一致。';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = '更新中…';

      try {
        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) throw error;
        // Sign out so the recovery session doesn't linger in localStorage.
        await supabase.auth.signOut().catch(() => {});
        showState('success');
      } catch (e) {
        console.error('updateUser failed', e);
        errEl.textContent = '更新失敗：' + (e?.message || e);
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '更新密碼';
      }
    });

    init();
  </script>
</body>
</html>
