server {
    listen 80;
    server_name www.credica.app;
    return 301 https://credica.app$request_uri;
}

server {
    listen 80;
    server_name credica.app _;
    root /usr/share/nginx/html;
    index index.html;

    # $request_uri keeps the browser-facing path during nginx's internal
    # index.html resolution, preventing the bare homepage from redirecting to
    # itself while still consolidating explicit /index variants.
    if ($request_uri ~ ^/index(?:\.html)?/?(?:\?|$)) {
        return 301 https://credica.app/;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # HTML pages — no cache (Cloudflare will respect this)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Version "20260615";
        try_files $uri =404;
    }

    # CSS/JS change frequently and keep stable URLs. Revalidate them so a
    # production deploy cannot leave clients on a stale navigation or layout.
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Fingerprint-stable media and fonts may be cached aggressively.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # .well-known — no cache, correct MIME type.
    # Use default_type (not add_header) so the extension-less
    # apple-app-site-association file is served as application/json
    # rather than application/octet-stream (universal-link friendliness).
    location /.well-known/ {
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Auth callback pages
    location ^~ /auth/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri.html $uri/ =404;
    }

    # Consolidate duplicate public URLs. Marketing subpages intentionally use
    # .html as their canonical form; the homepage canonical is the bare root.
    location ~ ^/(business|enterprise|pricing|enterprise-pricing|tutorial|about|privacy|terms)/?$ {
        return 301 https://credica.app/$1.html;
    }

    # Org public join code landing — /join-code/<CODE> serves a single
    # static page that reads the code from the path (JS), previews the org,
    # and offers「用 Credica App 開啟」(deep link) + store download.
    # iOS users with the app installed open the app directly via the AASA
    # universal link (.well-known/apple-app-site-association); this page is
    # the fallback for everyone else.
    location /join-code/ {
        try_files $uri /join-code.html;
    }

    # Shared business card landing — /card and /card/<TOKEN> (and /card?d=…).
    # Served INLINE from nginx (not a static file): Zeabur's BuildKit cache was
    # persistently dropping newly-COPY'd files (card.html 404'd no matter what),
    # but nginx.conf changes always deploy. iOS users with the app open it
    # directly via the AASA universal link; this is the fallback for LINE's
    # in-app browser and for users without the app — JS builds the credica://
    # deep link from the path/query and offers store downloads.
    location ~ ^/card(/.*)?$ {
        default_type text/html;
        add_header Cache-Control "no-cache, must-revalidate";
        return 200 '<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex"><title>數位名片 · Credica</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;background:#F4F5F7;color:#0F1220;min-height:100dvh;display:flex;align-items:center;justify-content:center;margin:0;padding:24px}.c{width:100%;max-width:420px;background:#fff;border-radius:24px;padding:32px 26px 28px;box-shadow:0 18px 48px rgba(15,18,32,.1);text-align:center}.e{font-size:13px;font-weight:700;color:#6B7280}.t{font-size:24px;font-weight:800;margin:8px 0 6px}.s{font-size:14px;color:#6B7280;line-height:1.6;margin:16px 0 22px}.b{display:block;padding:16px;border-radius:14px;font-size:16px;font-weight:800;text-decoration:none;margin-top:11px}.p{background:#1E2951;color:#fff}.o{background:#fff;color:#0F1220;border:1.5px solid rgba(15,18,32,.12)}.r{display:flex;gap:10px;margin-top:11px}.r .o{flex:1;font-size:14px;padding:14px}.f{font-size:12px;color:#9CA3AF;line-height:1.6;margin-top:20px}</style></head><body><div class="c"><div class="e">數位名片</div><div class="t" id="w">有人想和你交換名片</div><div class="s">用 Credica App 打開這個連結，對方的聯絡方式就會自動進你的名片夾。</div><a id="o" class="b p" href="credica://">📱 用 Credica App 開啟</a><div class="r"><a class="b o" href="https://apps.apple.com/tw/app/id6760047580">App Store</a><a class="b o" href="https://play.google.com/store/apps/details?id=com.credica.app">Google Play</a></div><div class="f">還沒有 App？先下載 Credica，再回到這個畫面按上面的按鈕。</div></div><script>var p=location.pathname.split("/").filter(Boolean),t=(p[0]=="card"&&p[1])?p[1]:"",d=new URLSearchParams(location.search).get("d");document.getElementById("o").href=t?"credica://card/"+encodeURIComponent(t):(d?"credica://card?d="+encodeURIComponent(d):"credica://");if(d){try{var b=d.replace(/-/g,"+").replace(/_/g,"/");while(b.length%4)b+="=";var j=JSON.parse(decodeURIComponent(escape(atob(b))));if(j&&j.name)document.getElementById("w").textContent=j.name+" 想和你交換名片"}catch(e){}}</script></body></html>';
    }

    # Serve .html files without extension
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
